<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Health Blog - PetCalCentral | Feeding Guides & Tips</title>
    <meta name="description" content="Real pet health advice from experienced owners. Dog food reviews, cat weight management, puppy feeding guides, and practical tips you can actually use.">
    <meta property="og:title" content="Pet Health Blog - PetCalCentral"><meta property="og:description" content="Real pet health advice. Practical tips you can actually use.">
    <meta property="og:url" content="https://petcalcentral.com/blog/"><meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="Pet Health Blog - PetCalCentral"><meta name="twitter:description" content="Real pet health advice.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:'#16a34a',brandDark:'#15803d',warm:'#fef9ef'}}}}</script>
    <style>.card-hover:hover{transform:translateY(-2px);transition:all 0.2s ease;}</style>
</head>
<body class="bg-white text-gray-800">
<header class="sticky top-0 bg-white/95 backdrop-blur border-b z-50"><div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center"><a href="/" class="text-2xl font-extrabold text-brand tracking-tight">🐾 PetCalCentral</a><nav class="hidden md:flex space-x-6 text-sm font-medium"><a href="/">Home</a><a href="/tools/">Tools</a><a href="/blog/" class="text-brand font-semibold">Blog</a><a href="/faq.html">FAQ</a><a href="/about.html">About</a></nav></div></header>
<main class="max-w-3xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-extrabold mb-2">📝 Pet Health Blog</h1>
    <p class="text-gray-500 mb-8 text-lg">Honest advice from someone who's been there — spilled kibble, late-night vet visits, and all.</p>
    <div id="ad-banner-top" class="mb-8"></div>
    <div class="space-y-8" id="blog-list"><p class="text-gray-400">Loading articles...</p></div>
</main>
<footer class="bg-gray-900 text-gray-400 py-12 mt-12"><div class="max-w-6xl mx-auto px-4 text-center text-sm space-x-4"><a href="/privacy.html" class="hover:text-white">Privacy</a><a href="/terms.html" class="hover:text-white">Terms</a><a href="/disclaimer.html" class="hover:text-white">Disclaimer</a><a href="/disclosure.html" class="hover:text-white">Affiliate Disclosure</a><a href="/sitemap.html" class="hover:text-white">Sitemap</a><p class="mt-4 text-gray-600">&copy; 2026 PetCalCentral.</p></div></footer>
<script>
fetch('/blog/articles.json').then(res=>res.json()).then(articles=>{articles.sort((a,b)=>new Date(b.date)-new Date(a.date));document.getElementById('blog-list').innerHTML=articles.map(a=>`<article class="bg-warm rounded-2xl p-6 border border-green-100 shadow-sm card-hover"><div class="flex flex-wrap gap-2 mb-3">${a.tags.map(t=>`<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">${t}</span>`).join('')}</div><h2 class="text-xl font-bold mb-2"><a href="/blog/${a.file}" class="hover:text-brand transition">${a.title}</a></h2><p class="text-gray-500 text-sm mb-2">📅 ${a.date} · ✍️ ${a.author}</p><p class="text-gray-600 mb-3">${a.excerpt}</p><a href="/blog/${a.file}" class="text-brand font-semibold hover:underline">Read More →</a></article>`).join('')}).catch(()=>{document.getElementById('blog-list').innerHTML='<p class="text-gray-400">Articles coming soon!</p>'});
</script>
<script src="/ads.js"></script>
<div id="ad-footer-bottom"></div>
</body>
</html>
