name: Auto-update blog index and sitemap

on:
  push:
    paths:
      - 'blog/*.html'
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run update script
        run: python .github/scripts/generate_articles.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add blog/articles.json sitemap.xml llms.txt
          git diff --staged --quiet || git commit -m "Auto-update articles.json, sitemap, llms.txt"
          git push