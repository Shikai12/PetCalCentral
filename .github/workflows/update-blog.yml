name: Auto-Update Blog Index

on:
  push:
    paths:
      - 'blog/**.html'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python .github/scripts/update_blog.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/index.html sitemap.xml llms.txt
          git diff --cached --quiet || git commit -m "Auto-update blog index, sitemap, llms"
          git push